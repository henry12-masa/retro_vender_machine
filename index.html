crossorigin="anonymous"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#11100c;
color:#fff;
font-family:system-ui,-apple-system,sans-serif;
}

header{
padding:26px;
text-align:center;
background:linear-gradient(135deg,#78350f,#b45309,#f59e0b);
}

header h1{
margin:0;
font-size:30px;
}

header p{
margin-top:8px;
color:#ffedd5;
}

.wrap{
max-width:1200px;
margin:auto;
padding:16px;
}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:16px;
}

.panel{
background:#1c1917;
border-radius:18px;
padding:16px;
border:1px solid rgba(255,255,255,.12);
}

label{
display:block;
margin:10px 0 6px;
font-weight:700;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.12);
background:#0c0a09;
color:#fff;
}

button{
border:0;
border-radius:12px;
padding:11px 14px;
background:#d97706;
color:#fff;
font-weight:700;
cursor:pointer;
}

button.secondary{
background:#57534e;
}

button.danger{
background:#dc2626;
}

.btns{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:10px;
}

#map{
height:620px;
border-radius:18px;
background:#374151;
}

.results{
display:grid;
gap:10px;
max-height:560px;
overflow:auto;
margin-top:12px;
}

.shop{
background:#0c0a09;
border:1px solid rgba(255,255,255,.1);
border-radius:14px;
padding:12px;
}

.shop h3{
margin:0 0 6px;
color:#fbbf24;
}

.tag{
display:inline-block;
background:#44403c;
padding:4px 8px;
border-radius:999px;
font-size:12px;
margin:2px;
}

.score{
display:inline-block;
background:#92400e;
padding:4px 8px;
border-radius:999px;
font-size:12px;
font-weight:700;
margin:2px;
}

.small{
font-size:13px;
color:#d6d3d1;
line-height:1.6;
}

#dataBox{
display:none;
}

textarea{
min-height:200px;
font-family:Consolas,monospace;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
#map{
height:430px;
}
}
</style>
</head>

<body>

<header>
<h1>東京 レトロ自販機DB</h1>
<p>昔ながらのうどん・そば・ハンバーガー・瓶飲料自販機スポットを地図で探せるDB</p>
</header>

<main class="wrap">

<div class="grid">

<section class="panel">

<label>エリア</label>
<select id="areaMode"></select>

<label>検索</label>
<input id="keyword" placeholder="例：中古タイヤ市場 うどん ハンバーガー 瓶コーラ">

<div class="btns">
<button onclick="applySearch()">検索</button>
<button class="secondary" onclick="showData()">CSV</button>
<button class="secondary" onclick="showResults()">結果</button>
<button class="danger" onclick="resetStores()">初期化</button>
</div>

<p id="status" class="small"></p>

<div id="resultsBox" class="results"></div>

<div id="dataBox">

<p class="small">
CSV形式：<br>
id,name,area,address,lat,lng,tags
</p>

<textarea id="csvInput"></textarea>

<div class="btns">
<button onclick="applyCsv()">CSV反映</button>
<button class="secondary" onclick="exportCsv()">CSV出力</button>
</div>

<textarea id="jsonBox"></textarea>

</div>

</section>

<section class="panel">
<div id="map"></div>
</section>

</div>

</main>

<script>

const STORAGE_KEY = "retro_vending_machine_db_v1";

/* GoogleスプレッドシートのCSV公開URLをここに入れる */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBdcOhX1-aLD_ANmTMfdikcTAVNT_PQoGnjOeO2TerdmCnWjmihPRkPjzyW4PqOt0-RUrEBVaIohqU/pub?output=csv";

const MAX_INITIAL_DISPLAY = 150;

const DEFAULT_STORES = [
{
id:"retro_vm_001",
name:"中古タイヤ市場 相模原店 自販機コーナー",
area:"相模原",
address:"神奈川県相模原市南区下溝2661-1",
lat:35.5292,
lng:139.3734,
tags:["レトロ自販機","うどん","そば","ハンバーガー","瓶飲料"]
},
{
id:"retro_vm_002",
name:"オートパーラー上尾",
area:"上尾",
address:"埼玉県上尾市久保70-2",
lat:35.9927,
lng:139.5896,
tags:["レトロ自販機","うどん","そば","ゲームコーナー"]
},
{
id:"retro_vm_003",
name:"鉄剣タロー",
area:"行田",
address:"埼玉県行田市下忍315-1",
lat:36.1182,
lng:139.4798,
tags:["レトロ自販機","うどん","そば","ハンバーガー"]
},
{
id:"retro_vm_004",
name:"ドライブイン七輿",
area:"藤岡",
address:"群馬県藤岡市上落合853",
lat:36.2535,
lng:139.0545,
tags:["レトロ自販機","うどん","ラーメン","トースト"]
},
{
id:"retro_vm_005",
name:"丸美屋自販機コーナー",
area:"みどり",
address:"群馬県みどり市東町花輪1973",
lat:36.5204,
lng:139.3192,
tags:["レトロ自販機","うどん","そば","ラーメン"]
}
];

let stores = [];
let filteredStores = [];
let map;
let markers = [];

async function init(){

stores = await loadStores();

map = L.map("map").setView([35.681236,139.767125],9);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"&copy; OpenStreetMap contributors"
}
).addTo(map);

document.getElementById("areaMode").addEventListener("change",applySearch);
document.getElementById("keyword").addEventListener("input",applySearch);

buildAreas();
applySearch();

}

async function loadStores(){

try{

if(CSV_URL){

const res = await fetch(CSV_URL);
const text = await res.text();
const csvData = parseCsv(text);

if(csvData.length) return csvData;

}

}catch(e){
console.error(e);
}

const saved = localStorage.getItem(STORAGE_KEY);

if(saved){
try{
return JSON.parse(saved);
}catch(e){}
}

return DEFAULT_STORES;

}

function parseCsv(text){

const lines = text.trim().split(/\r?\n/);

if(lines.length < 2) return [];

const data = [];

for(let i=1;i<lines.length;i++){

const row = splitCsvLine(lines[i]);

if(row.length < 6) continue;

data.push({
id:row[0],
name:row[1],
area:row[2],
address:row[3],
lat:Number(row[4]),
lng:Number(row[5]),
tags:(row[6]||"").split("|").filter(Boolean)
});

}

return data.filter(s=>s.name && !isNaN(s.lat) && !isNaN(s.lng));

}

function splitCsvLine(line){

const result = [];
let current = "";
let inQuotes = false;

for(let i=0;i<line.length;i++){

const char = line[i];

if(char === '"' && line[i+1] === '"'){
current += '"';
i++;
}else if(char === '"'){
inQuotes = !inQuotes;
}else if(char === "," && !inQuotes){
result.push(current);
current = "";
}else{
current += char;
}

}

result.push(current);

return result;

}

function buildAreas(){

const select = document.getElementById("areaMode");

const areas = [...new Set(stores.map(x=>x.area).filter(Boolean))];

select.innerHTML = '<option value="all">全体</option>';

areas.forEach(a=>{

const opt = document.createElement("option");
opt.value = a;
opt.textContent = a;
select.appendChild(opt);

});

}

function applySearch(){

const area = document.getElementById("areaMode").value;
const kw = document.getElementById("keyword").value.toLowerCase();

let results = stores.filter(s=>{

const text = [
s.name,
s.area,
s.address,
(s.tags||[]).join(" ")
].join(" ").toLowerCase();

return (area==="all" || s.area===area)
&& (!kw || text.includes(kw));

});

filteredStores = results.slice(0,MAX_INITIAL_DISPLAY);

renderResults();
renderMarkers();

document.getElementById("status").textContent =
filteredStores.length + "件表示 / 該当" + results.length + "件";

}

function renderResults(){

const box = document.getElementById("resultsBox");

if(!filteredStores.length){
box.innerHTML = "該当なし";
return;
}

box.innerHTML = filteredStores.map((s,i)=>`

<div class="shop">

<h3>${i+1}. ${escapeHtml(s.name)}</h3>

<p>${escapeHtml(s.address)}</p>

<p>
<span class="score">レトロ度</span>
<span class="tag">${escapeHtml(s.area)}</span>
${(s.tags||[]).map(t=>`
<span class="tag">${escapeHtml(t)}</span>
`).join("")}
</p>

<div class="btns">

<button class="secondary" onclick="focusStore('${s.id}')">
地図
</button>

<button onclick="openGoogle('${s.id}')">
GoogleMap
</button>

</div>

</div>

`).join("");

}

function renderMarkers(){

markers.forEach(m=>m.remove());
markers = [];

filteredStores.forEach(s=>{

const marker = L.marker([s.lat,s.lng]).addTo(map);

marker.storeId = s.id;
marker.bindPopup("<b>"+escapeHtml(s.name)+"</b><br>"+escapeHtml(s.address));

markers.push(marker);

});

}

function focusStore(id){

const s = stores.find(x=>x.id===id);

if(!s) return;

map.setView([s.lat,s.lng],16);

const m = markers.find(x=>x.storeId===id);

if(m) m.openPopup();

}

function openGoogle(id){

const s = stores.find(x=>x.id===id);

if(!s) return;

window.open(
"https://www.google.com/maps/search/?api=1&query="
+ encodeURIComponent(s.name+" "+s.address),
"_blank"
);

}

function applyCsv(){

const raw = document.getElementById("csvInput").value;

stores = parseCsv(raw);

localStorage.setItem(STORAGE_KEY,JSON.stringify(stores));

buildAreas();
applySearch();

}

function exportCsv(){

const csv = stores.map(s=>
[
csvEscape(s.id),
csvEscape(s.name),
csvEscape(s.area),
csvEscape(s.address),
s.lat,
s.lng,
csvEscape((s.tags||[]).join("|"))
].join(",")
).join("\n");

document.getElementById("csvInput").value =
"id,name,area,address,lat,lng,tags\n"+csv;

document.getElementById("jsonBox").value =
JSON.stringify(stores,null,2);

}

function resetStores(){

localStorage.removeItem(STORAGE_KEY);

stores = DEFAULT_STORES;

buildAreas();
applySearch();

}

function showData(){

document.getElementById("dataBox").style.display = "block";
document.getElementById("resultsBox").style.display = "none";

}

function showResults(){

document.getElementById("dataBox").style.display = "none";
document.getElementById("resultsBox").style.display = "grid";

}

function escapeHtml(str){

return String(str || "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");

}

function csvEscape(value){

const str = String(value ?? "");

if(str.includes(",") || str.includes('"') || str.includes("\n")){
return '"' + str.replace(/"/g,'""') + '"';
}

return str;

}

window.addEventListener("load",init);

</script>

</body>
